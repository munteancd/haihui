<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Haihui</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app"></div>
  <footer>City data © GeoNames (CC BY 4.0)</footer>
  <script type="module" src="src/main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      // When a new service worker takes control, reload once so the page always ends up on
      // the latest code. Guard against the first-ever install (no previous controller) and
      // against reload loops.
      let reloading = false;
      if (navigator.serviceWorker.controller) {
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (reloading) return;
          reloading = true;
          location.reload();
        });
      }
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
